title: Suspicious Modification of Dependency Manifest Files
id: 8f9a0b1c-2d3e-4f5a-6b7c-8d9e0f1a2b3c
status: experimental
description: Rileva la modifica di file manifest delle dipendenze (package.json, package-lock.json, requirements.txt, Pipfile, yarn.lock) da parte di processi non riconducibili a editor/IDE o pipeline CI/CD attese, possibile indicatore di dependency confusion o typosquatting iniettato nel repo
references:
    - https://attack.mitre.org/techniques/T1195.001/
author: Lorenzo
date: 2026/06/30
tags:
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: linux
detection:
    selection_file:
        TargetFilename|endswith:
            - 'package.json'
            - 'package-lock.json'
            - 'requirements.txt'
            - 'Pipfile'
            - 'Pipfile.lock'
            - 'yarn.lock'
    filter_known_tools:
        Image|endswith:
            - '/npm'
            - '/yarn'
            - '/pip'
            - '/code'
            - '/git'
    condition: selection_file and not filter_known_tools
falsepositives:
    - Editor o tool non inclusi nella whitelist (aggiornare filter_known_tools in base al proprio ambiente reale)
level: medium
