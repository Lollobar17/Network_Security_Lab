title: Suspicious PowerShell Encoded Command Execution
id: 3f2a1b4c-7d8e-4f9a-b1c2-d3e4f5a6b7c8
status: experimental
description: Rileva l'esecuzione di PowerShell con comando codificato in Base64, tecnica comune per offuscare payload malevoli e bypassare AMSI/logging
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Lorenzo
date: 2026/06/30
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_flags:
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - '-e '
    selection_suspicious_flags:
        CommandLine|contains:
            - '-w hidden'
            - '-windowstyle hidden'
            - '-nop'
            - '-noni'
            - '-noP'
            - '-w 1'
    condition: selection_img and selection_flags and 1 of selection_suspicious_flags
falsepositives:
    - Script di amministrazione legittimi che usano flag automatizzati
level: high
