name: Sigma Rules — Elasticsearch Validation

on:
  workflow_dispatch:
  push:
    paths:
      - "07_detection_content/rules/**"
      - "07_detection_content/data/**"
      - "07_detection_content/ci/**"
      - ".github/workflows/sigma-elasticsearch-validation.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -s http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r 07_detection_content/ci/requirements.txt

      - name: Wait for Elasticsearch to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:9200/_cluster/health > /dev/null 2>&1; then
              echo "Elasticsearch is ready"
              exit 0
            fi
            echo "Waiting for Elasticsearch... attempt $i"
            sleep 2
          done
          echo "Elasticsearch failed to start"
          exit 1

      - name: Validate rules and convert to Lucene queries
        run: python3 07_detection_content/ci/convert_to_lucene.py

      - name: Run queries against live Elasticsearch
        run: python3 07_detection_content/ci/run_against_elasticsearch.py

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: elasticsearch-validation-report
          path: |
            07_detection_content/lucene_queries.json
            07_detection_content/elasticsearch_validation_report.md
